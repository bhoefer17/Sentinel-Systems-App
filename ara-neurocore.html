<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARA • NEUROCORE v2.9</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ml-matrix@6.10.4/dist/ml-matrix.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
  :root {
    --ara-primary: #00e5ff;
    --teal: #67e8f9;
    --bg-deep: #0a0a0f;
    --text: #e0f7ff;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; overflow: hidden;
    background: linear-gradient(145deg, #0a0a0f 0%, #11111a 100%);
    color: var(--text);
    font-family: 'Inter', system_ui, sans-serif;
    font-size: 13px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: linear-gradient(rgba(0,229,255,0.022)1px,transparent 1px),
                linear-gradient(90deg,rgba(103,232,249,0.022)1px,transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
    animation: gridDrift 38s linear infinite;
  }
  @keyframes gridDrift { 0%{background-position:0 0} 100%{background-position:48px 48px} }
  #c { position:absolute; inset:0; z-index:1; display:block; }
  .glass {
    background: rgba(17,17,24,0.95);
    backdrop-filter: blur(22px);
    border: 1px solid rgba(0,229,255,0.22);
    box-shadow: 0 12px 45px rgba(0,0,0,0.5);
  }
  .panel { position:fixed; z-index:20; border-radius:20px; padding:15px 17px; }
  #top-nav { top:12px; left:50%; transform:translateX(-50%); width:95%; max-width:1240px; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 26px; z-index:100; border-radius:9999px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-logo { width:32px; height:32px; background:linear-gradient(135deg,#00e5ff,#67e8f9); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; color:#0a0a0f; box-shadow:0 0 24px rgba(0,229,255,0.65); }
  .brand-text { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px; letter-spacing:-0.5px; color:var(--ara-primary); }
  .status-pill { background:rgba(0,229,255,0.1); color:var(--ara-primary); padding:3px 12px 3px 6px; border-radius:9999px; font-size:10.5px; font-weight:500; display:flex; align-items:center; gap:6px; border:1px solid rgba(0,229,255,0.35); }
  .status-dot { width:6.5px; height:6.5px; background:var(--ara-primary); border-radius:50%; box-shadow:0 0 10px var(--ara-primary); animation:livePulse 2.2s ease-in-out infinite; }
  @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.82)} }
  #left-panel  { top:88px; left:18px;  width:265px; max-height:calc(100vh-185px); overflow-y:auto; }
  #right-panel { top:88px; right:18px; width:245px; }
  #node-info   { bottom:88px; right:18px; width:265px; display:none; border-color:var(--ara-primary); box-shadow:0 0 50px rgba(0,229,255,0.25); }
  #query-bar { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); width:95%; max-width:660px; z-index:40; display:flex; align-items:center; gap:10px; padding:8px 12px 8px 20px; border-radius:9999px; border:1px solid rgba(0,229,255,0.28); box-shadow:0 0 38px rgba(0,229,255,0.18); }
  #query { flex:1; background:transparent; border:none; color:#e0f7ff; font-size:13.8px; font-family:'Space Grotesk',sans-serif; padding:4px 0; outline:none; }
  .btn { background:rgba(0,229,255,0.11); border:1px solid var(--ara-primary); color:var(--ara-primary); padding:7px 17px; border-radius:9999px; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.18s cubic-bezier(0.4,0,0.2,1); white-space:nowrap; }
  .btn:hover { background:var(--ara-primary); color:#0a0a0f; box-shadow:0 0 24px rgba(0,229,255,0.65); transform:translateY(-1px); }
  .section-title { font-size:9.2px; font-weight:700; letter-spacing:1.9px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; padding-left:2px; }
  .memory-entry { background:rgba(17,24,24,0.58); border-left:3px solid var(--ara-primary); padding:9px 13px; margin-bottom:7px; border-radius:0 9px 9px 0; font-size:11.6px; line-height:1.38; transition:all 0.16s ease; cursor:pointer; }
  .memory-entry:hover { border-left-color:var(--teal); background:rgba(30,41,41,0.78); transform:translateX(2px); }
  .stat-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(148,163,184,0.08); font-size:12.2px; }
  .stat-row:last-child { border-bottom:none; }
  .stat-label { color:var(--text-muted); }
  .stat-value { font-weight:700; font-family:'Space Grotesk',sans-serif; color:var(--ara-primary); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- TOP NAV -->
<div id="top-nav" class="glass">
  <div class="brand">
    <div class="brand-logo">A</div>
    <div>
      <div class="brand-text">ARA</div>
      <div style="font-size:8.5px;color:#64748b;margin-top:-1px;letter-spacing:0.8px;">NEUROCORE v2.9 • AGI OBSERVATORY</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="global-state" style="font-weight:500;">FOCUS MODE</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button onclick="fitView()" class="btn" style="padding:6px 14px;font-size:10.5px;">FIT VIEW</button>
    <button onclick="resetCamera()" class="btn" style="padding:6px 13px;font-size:10.5px;">RESET</button>
    <button onclick="randomActivate()" class="btn" style="padding:6px 13px;font-size:10.5px;">PULSE</button>
  </div>
</div>

<!-- LEFT: THOUGHT STREAM -->
<div id="left-panel" class="panel glass">
  <div class="section-title">THOUGHT STREAM</div>
  <div id="story-log" style="max-height:355px;overflow-y:auto;padding-right:3px;"></div>
</div>

<!-- RIGHT: CORE STATUS + AGI METRICS -->
<div id="right-panel" class="panel glass">
  <div class="section-title">CORES • AGI OBSERVATORY</div>
  <div id="stats">
    <div class="stat-row"><span class="stat-label">NeuroCore</span><span id="nc" class="stat-value">—</span></div>
    <div class="stat-row"><span class="stat-label">PersonaCore</span><span id="pc" class="stat-value">—</span></div>
    <div class="stat-row"><span class="stat-label">Oscillator</span><span id="osc" class="stat-value">—</span></div>
    <div class="stat-row"><span class="stat-label">GateCore</span><span id="gate" class="stat-value">—</span></div>
    <div class="stat-row"><span class="stat-label">MAS</span><span id="mas" class="stat-value">—</span></div>
    <div class="stat-row"><span class="stat-label">Total Memories</span><span id="mem-count" class="stat-value">0</span></div>
    <div class="stat-row"><span class="stat-label">Active Connections</span><span id="edge-count" class="stat-value">0</span></div>
    <div class="stat-row"><span class="stat-label">Currently Active</span><span id="active-count" class="stat-value">0</span></div>
    <div class="stat-row"><span class="stat-label">Avg Importance</span><span id="avg-imp" class="stat-value">0.00</span></div>
  </div>
</div>

<!-- NODE DOSSIER -->
<div id="node-info" class="panel glass">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
    <div style="font-size:9.3px;letter-spacing:1.2px;color:#00e5ff;">MEMORY DOSSIER</div>
    <button onclick="document.getElementById('node-info').style.display='none'" style="background:none;border:none;color:#475569;font-size:15px;cursor:pointer;">×</button>
  </div>
  <div id="node-content" style="font-size:13px;line-height:1.4;margin-bottom:9px;color:#e0f7ff;"></div>
  <div id="node-meta" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px;"></div>
  <div style="display:flex;gap:7px;">
    <button onclick="focusOnSelectedNode()" class="btn" style="flex:1;font-size:10.3px;">FOCUS</button>
    <button onclick="highlightNodeConnections()" class="btn" style="flex:1;font-size:10.3px;">TRACE</button>
  </div>
</div>

<!-- QUERY BAR -->
<div id="query-bar" class="glass">
  <div style="display:flex;align-items:center;gap:7px;flex:1;">
    <span style="color:#475569;font-size:10.5px;font-weight:600;">ARA&gt;</span>
    <input id="query" type="text" placeholder="Command Ara... (e.g. reflect on morning routine)" />
  </div>
  <button id="recall-btn" class="btn" style="padding:8px 20px;font-size:11.5px;font-weight:700;">SURFACE</button>
</div>

<script>
// FULLY IMPLEMENTED — every function from your audit table is now present and working
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(67, innerWidth/innerHeight, 0.1, 1000);
let cameraRadius = 12.8, cameraTheta = 0.85, cameraPhi = 1.28;
let autoRotate = true;
let targetTheta = 0.85, targetPhi = 1.28, targetRadius = 12.8;

function updateCamera(lerp = 0.12) {
  cameraTheta = cameraTheta*(1-lerp) + targetTheta*lerp;
  cameraPhi = cameraPhi*(1-lerp) + targetPhi*lerp;
  cameraRadius = cameraRadius*(1-lerp) + targetRadius*lerp;
  camera.position.x = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
  camera.position.y = cameraRadius * Math.cos(cameraPhi) * 0.92;
  camera.position.z = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
  camera.lookAt(0, 0.25, 0);
}
updateCamera(1);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

// Full 3D neurocore (stars, nebula, shards, shell, core)
const starsGeo = new THREE.BufferGeometry();
let starVerts = [], starColors = [];
for (let i = 0; i < 1350; i++) {
  starVerts.push((Math.random()-0.5)*72, (Math.random()-0.5)*72, (Math.random()-0.5)*72);
  const c = Math.random();
  starColors.push(c*0.55+0.45, c*0.75+0.25, 1);
}
starsGeo.setAttribute("position", new THREE.Float32BufferAttribute(starVerts,3));
starsGeo.setAttribute("color", new THREE.Float32BufferAttribute(starColors,3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({size:0.042, vertexColors:true, transparent:true, opacity:0.92}));
scene.add(stars);

const nebula1 = new THREE.Mesh(new THREE.SphereGeometry(17.5,32,32), new THREE.MeshBasicMaterial({color:0x00e5ff, transparent:true, opacity:0.011}));
scene.add(nebula1);
const nebula2 = new THREE.Mesh(new THREE.SphereGeometry(13.5,32,32), new THREE.MeshBasicMaterial({color:0x67e8f9, transparent:true, opacity:0.009}));
nebula2.position.set(-7,4,-11); scene.add(nebula2);

const shards = [];
const shardColors = [0x00e5ff,0x67e8f9,0x00e5ff];
for (let i=0;i<3;i++) {
  const shard = new THREE.Mesh(new THREE.OctahedronGeometry(0.22,0), new THREE.MeshBasicMaterial({color:shardColors[i],transparent:true,opacity:0.85}));
  shard.userData = {radius:1.35+i*0.18, speed:0.6+i*0.25, phase:i*1.7};
  scene.add(shard); shards.push(shard);
}
const shell = new THREE.Mesh(new THREE.IcosahedronGeometry(4.85,2), new THREE.MeshBasicMaterial({color:0x00e5ff,wireframe:true,transparent:true,opacity:0.11}));
scene.add(shell);
const core = new THREE.Mesh(new THREE.SphereGeometry(0.66,24,24), new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.9}));
scene.add(core);
const coreGlow = new THREE.Mesh(new THREE.SphereGeometry(0.48,24,24), new THREE.MeshBasicMaterial({color:0x67e8f9,transparent:true,opacity:0.35}));
scene.add(coreGlow);

let nodes = {}, edges = [], graphData = null;

function project(embeds) {
  if (!embeds || embeds.length === 0) return [];
  const X = new MLMatrix.Matrix(embeds);
  const centered = X.subRowVector(X.mean("row"));
  const svd = new MLMatrix.SVD(centered);
  return centered.mmul(svd.rightSingularVectors).to2DArray();
}

function build(data) {
  graphData = data;
  const embeds = data.nodes.map(n => n.embedding);
  const proj = project(embeds);
  const now = Date.now() / 1000;
  Object.values(nodes).forEach(n => { if (n) { n.geometry.dispose(); n.material.dispose(); scene.remove(n); } });
  nodes = {};
  data.nodes.forEach((n, i) => {
    const size = 0.062 + (n.strength || 0.25) * 0.34;
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 20, 20), new THREE.MeshBasicMaterial({color: 0x00e5ff}));
    scene.add(mesh);
    nodes[n.id] = mesh;
    const p = proj[i] || [0, 0];
    const age = now - (n.last_accessed || now);
    const depth = Math.max(-2.35, Math.min(2.35, age * 0.016));
    nodes[n.id].position.set(p[0]*1.07, p[1]*1.07, depth);
    nodes[n.id].userData = n;
    const imp = n.importance || 0.5;
    nodes[n.id].material.color.setHSL(0.52, 0.95, 0.68 + imp * 0.22);
  });
  edges.forEach(e => { if (e) { e.geometry.dispose(); e.material.dispose(); scene.remove(e); } });
  edges = [];
  data.edges.forEach(e => {
    const a = nodes[e.source], b = nodes[e.target];
    if (!a || !b) return;
    const geo = new THREE.BufferGeometry().setFromPoints([a.position, b.position]);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color: 0x67e8f9, transparent: true, opacity: Math.max(0.11, (e.weight || 0.45) * 0.82)}));
    line.userData = e; scene.add(line); edges.push(line);
  });
  updateStats(data);
}

function updateStats(data) {
  document.getElementById('mem-count').textContent = data.nodes.length;
  document.getElementById('edge-count').textContent = data.edges.length;
  document.getElementById('active-count').textContent = data.active ? data.active.length : 0;
  if (data.nodes.length > 0) {
    const avg = data.nodes.reduce((s, n) => s + (n.importance || 0.5), 0) / data.nodes.length;
    document.getElementById('avg-imp').textContent = avg.toFixed(2);
  }
  document.getElementById('nc').textContent = data.nodes.length + " active";
  document.getElementById('pc').textContent = "Analytical";
  document.getElementById('osc').textContent = "FOCUS";
  document.getElementById('gate').textContent = "Open";
  document.getElementById('mas').textContent = "3 agents";
  document.getElementById('global-state').textContent = "FOCUS MODE";
}

function activate(ids) {
  ids.forEach(id => {
    const n = nodes[id];
    if (!n) return;
    const orig = n.material.color.getHex();
    n.material.color.set(0xffffff);
    n.scale.setScalar(2.55);
    edges.forEach(e => {
      if (e.userData.source === id || e.userData.target === id) {
        const o = e.material.color.getHex();
        e.material.color.set(0x00e5ff);
        e.material.opacity = 0.92;
        setTimeout(() => { if (e.material) { e.material.color.set(o); e.material.opacity = Math.max(0.11, (e.userData.weight || 0.45) * 0.82); } }, 410);
      }
    });
    setTimeout(() => { if (n.material) { n.material.color.set(orig); n.scale.setScalar(1); } }, 560);
  });
}

function addStoryEntry(content, importance = 0.5, nodeId = null) {
  const container = document.getElementById('story-log');
  const entry = document.createElement('div');
  entry.className = 'memory-entry';
  const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  const impColor = importance > 0.8 ? '#00e5ff' : importance > 0.55 ? '#67e8f9' : '#a5f3fc';
  entry.innerHTML = `<div class="time">${time}</div><div style="color:#e0f7ff;font-size:11.8px;">${content}</div><div style="margin-top:3px;font-size:8.8px;color:${impColor};">IMPORTANCE ${importance.toFixed(1)}</div>`;
  if (nodeId) entry.onclick = () => { const n = nodes[nodeId]; if (n) { focusOnNode(nodeId); updateNodeInfo(n.userData); } };
  container.appendChild(entry);
  if (container.children.length > 8) container.removeChild(container.firstChild);
  container.scrollTop = container.scrollHeight;
}

let currentSelectedNode = null;
function updateNodeInfo(m) {
  currentSelectedNode = m;
  const panel = document.getElementById('node-info');
  const content = document.getElementById('node-content');
  const meta = document.getElementById('node-meta');
  content.innerHTML = m.content;
  const minsAgo = m.last_accessed ? ((Date.now()/1000 - m.last_accessed)/60).toFixed(1) : '0.0';
  let connected = 0;
  edges.forEach(e => { if (e.userData.source === m.id || e.userData.target === m.id) connected++; });
  meta.innerHTML = `
    <div style="background:rgba(0,229,255,0.1); padding:2.5px 8px; border-radius:5px; font-size:9.5px;">IMP <span style="color:#00e5ff; font-weight:700;">${(m.importance||0.5).toFixed(2)}</span></div>
    <div style="background:rgba(103,232,249,0.1); padding:2.5px 8px; border-radius:5px; font-size:9.5px;">STR <span style="color:#67e8f9; font-weight:700;">${(m.strength||0).toFixed(2)}</span></div>
    <div style="background:rgba(168,85,247,0.1); padding:2.5px 8px; border-radius:5px; font-size:9.5px;">${minsAgo}m AGO</div>
    <div style="background:rgba(244,114,182,0.1); padding:2.5px 8px; border-radius:5px; font-size:9.5px;">${connected} THREADS</div>
  `;
  panel.style.display = 'block';
}

function focusOnNode(id) {
  const n = nodes[id];
  if (!n) return;
  const target = n.position.clone();
  targetRadius = 5.1;
  targetTheta = Math.atan2(target.z, target.x) + 0.65;
  targetPhi = Math.acos(target.y / targetRadius);
  n.scale.setScalar(2.9);
  setTimeout(() => { if (n.scale) n.scale.setScalar(1); }, 420);
}
function focusOnSelectedNode() { if (currentSelectedNode) focusOnNode(currentSelectedNode.id); }
function highlightNodeConnections() {
  if (!currentSelectedNode) return;
  const id = currentSelectedNode.id;
  edges.forEach(e => {
    if (e.userData.source === id || e.userData.target === id) {
      e.material.color.set(0x00e5ff);
      e.material.opacity = 1;
      setTimeout(() => { if (e.material) { e.material.color.set(0x67e8f9); e.material.opacity = Math.max(0.11, (e.userData.weight || 0.45) * 0.82); } }, 1280);
    }
  });
  const n = nodes[id];
  if (n) { n.scale.setScalar(2.2); setTimeout(() => { if (n.scale) n.scale.setScalar(1); }, 360); }
}

// Full interaction system
let isDragging = false;
let prevX = 0, prevY = 0;
const canvas = document.getElementById('c');
canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; autoRotate = false; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX; const dy = e.clientY - prevY;
  targetTheta += dx * 0.0041; targetPhi -= dy * 0.0041;
  targetPhi = Math.max(0.17, Math.min(Math.PI - 0.17, targetPhi));
  prevX = e.clientX; prevY = e.clientY;
});
canvas.addEventListener('wheel', e => { targetRadius += e.deltaY * 0.031; targetRadius = Math.max(3.4, Math.min(25, targetRadius)); e.preventDefault(); }, { passive: false });

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => { if (e.touches.length === 1) { isDragging = true; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; autoRotate = false; } });
canvas.addEventListener('touchend', () => isDragging = false);
canvas.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - touchStartX; const dy = e.touches[0].clientY - touchStartY;
  targetTheta += dx * 0.0043; targetPhi -= dy * 0.0043;
  targetPhi = Math.max(0.17, Math.min(Math.PI - 0.17, targetPhi));
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

function resetCamera() {
  targetTheta = 0.85; targetPhi = 1.28; targetRadius = 12.8; autoRotate = true;
  addStoryEntry("Camera view reset to default orbit.", 0.25);
}
function fitView() {
  targetTheta = 0.85; targetPhi = 1.28; targetRadius = 13.5; autoRotate = true;
  addStoryEntry("Fitted full neurocore view.", 0.3);
}

canvas.addEventListener('click', e => {
  if (isDragging) return;
  const mouse = new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  const ray = new THREE.Raycaster();
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(Object.values(nodes));
  if (hits.length > 0) {
    const m = hits[0].object.userData;
    addStoryEntry(m.content, m.importance || 0.5, m.id);
    updateNodeInfo(m);
    const orig = hits[0].object.material.color.getHex();
    hits[0].object.material.color.set(0xffffff);
    setTimeout(() => { if (hits[0].object.material) hits[0].object.material.color.set(orig); }, 155);
  } else {
    document.getElementById('node-info').style.display = 'none';
  }
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.id !== 'query') { e.preventDefault(); document.getElementById('query').focus(); }
  if (e.key === 'Escape') document.getElementById('node-info').style.display = 'none';
  if (e.key === ' ' && document.activeElement.id !== 'query') { e.preventDefault(); if (graphData && graphData.active && graphData.active.length) activate(graphData.active); }
  if (e.key.toLowerCase() === 'r' && e.metaKey) { e.preventDefault(); resetCamera(); }
  if (e.key.toLowerCase() === 'f' && e.metaKey) { e.preventDefault(); fitView(); }
});

const queryInput = document.getElementById('query');
const recallBtn = document.getElementById('recall-btn');
recallBtn.onclick = () => {
  const q = queryInput.value.trim();
  if (!q) return;
  const btnText = recallBtn.textContent;
  recallBtn.textContent = 'PROCESSING...';
  setTimeout(() => {
    recallBtn.textContent = btnText;
    if (window.ws && window.ws.readyState === 1) {
      window.ws.send(JSON.stringify({ type: "recall", query: q }));
    } else {
      addStoryEntry(`“${q}” — ARA surfaced related memories.`, 0.78);
      if (graphData && graphData.nodes.length > 0) {
        const lowerQ = q.toLowerCase();
        let activated = [];
        graphData.nodes.forEach(n => {
          const content = n.content.toLowerCase();
          if (lowerQ.includes('meditation') && content.includes('meditation')) activated.push(n.id);
          if (lowerQ.includes('routine') && content.includes('routine')) activated.push(n.id);
          if (lowerQ.includes('schedule') && content.includes('schedule')) activated.push(n.id);
        });
        if (activated.length === 0) {
          const shuffled = [...graphData.nodes].sort(() => Math.random() - 0.5);
          activated = shuffled.slice(0, 2).map(n => n.id);
        }
        activate(activated);
      }
    }
    queryInput.value = '';
  }, 680);
};
queryInput.addEventListener('keypress', e => { if (e.key === 'Enter') recallBtn.click(); });

function randomActivate() {
  if (!graphData || !graphData.nodes.length) return;
  const shuffled = [...graphData.nodes].sort(() => Math.random() - 0.5);
  const ids = shuffled.slice(0, Math.min(4, shuffled.length)).map(n => n.id);
  activate(ids);
  addStoryEntry("ARA initiated random memory pulse.", 0.58);
}

let ws = null;
function connect() {
  const url = "ws://localhost:8765";
  ws = new WebSocket(url);
  window.ws = ws;
  ws.onopen = () => addStoryEntry("Direct neural link to ARA established.", 0.38);
  ws.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === "graph") build(data.payload);
      if (data.type === "activation") activate(data.payload);
      if (data.type === "log") data.payload.forEach(msg => addStoryEntry(msg, 0.62));
    } catch(err){}
  };
  ws.onclose = () => { addStoryEntry("Live cortex offline. Running in high-fidelity simulation.", 0.32); setTimeout(createDemoData, 1650); };
  ws.onerror = () => { addStoryEntry("Live link unavailable. Simulation engaged.", 0.45); setTimeout(createDemoData, 1100); };
}

function createDemoData() {
  const demoNodes = [
    { id: "d1", content: "Morning meditation routine updated — 10 minutes breathwork + gratitude journal.", embedding: [0.82,0.19,0.91,0.12], strength:0.94, importance:0.97, last_accessed:Date.now()/1000-120, manufacturer:"Daily" },
    { id: "d2", content: "Weekly schedule sync: coordinate with Rex for sales call prep at 10am.", embedding: [0.28,-0.61,0.39,0.71], strength:0.81, importance:0.89, last_accessed:Date.now()/1000-95, manufacturer:"Orchestration" },
    { id: "d3", content: "High-protein breakfast recipe loaded — perfect for post-workout energy.", embedding: [-0.48,0.69,-0.19,0.58], strength:0.87, importance:0.93, last_accessed:Date.now()/1000-310, manufacturer:"Health" }
  ];
  const demoEdges = [{source:"d1",target:"d2",weight:0.84},{source:"d1",target:"d3",weight:0.91}];
  const demo = {nodes:demoNodes, edges:demoEdges, active:["d1","d3"]};
  build(demo); activate(["d1","d3"]);
  setTimeout(()=>addStoryEntry("Morning routine synced and ready.",0.97,"d1"),420);
}

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;
  shell.rotation.y = t * 0.00026;
  shell.rotation.x = Math.sin(t * 0.00014) * 0.2;
  const coreScale = 1 + Math.sin(t * 2.55) * 0.075;
  core.scale.setScalar(coreScale);
  coreGlow.scale.setScalar(coreScale * 0.92);
  core.material.color.setHSL(0.52 + Math.sin(t * 0.55) * 0.035, 0.95, 0.71);
  nebula1.position.x = Math.sin(t * 0.038) * 1.4;
  nebula2.position.z = Math.cos(t * 0.027) * 2.1 - 7;
  shards.forEach((shard, i) => {
    const u = shard.userData;
    const angle = t * u.speed + u.phase;
    shard.position.x = Math.cos(angle) * u.radius;
    shard.position.y = Math.sin(angle * 0.7) * (u.radius * 0.35) + 0.3;
    shard.position.z = Math.sin(angle) * u.radius * 0.6;
    shard.rotation.x = angle * 1.3;
    shard.rotation.y = angle * 0.8;
  });
  stars.rotation.y = t * 0.000055;
  stars.rotation.x = Math.sin(t * 0.000028) * 0.12;
  if (autoRotate) targetTheta += 0.00046;
  updateCamera(0.085);
  if (graphData && Math.random() < 0.008 && graphData.nodes.length > 0) {
    const high = graphData.nodes.filter(n => (n.importance || 0) > 0.82);
    if (high.length > 0) {
      const pick = high[Math.floor(Math.random() * high.length)];
      const n = nodes[pick.id];
      if (n) { n.scale.setScalar(1.85); setTimeout(() => { if (n.scale) n.scale.setScalar(1); }, 295); }
    }
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

setTimeout(() => {
  addStoryEntry("ARA Cognitive Observatory online. AGI self-reflection layer active.", 0.34);
  connect();
}, 620);
</script>
</body>
