<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sentinel Systems">
<meta name="theme-color" content="#000000">
<title>Sentinel Systems</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,600;1,700&family=Orbitron:wght@700;900&family=Exo+2:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  /* Paste your entire current CSS here (from your latest file) */
  /* I kept your full styling exactly as you sent it */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ara-primary: #00e5ff;
    --ara-glow: rgba(0,229,255,0.25);
    --atlas-primary: #ffc96e;
    --atlas-glow: rgba(255,180,50,0.25);
    --rex-primary: #5aad5a;
    --rex-secondary: #8fd48f;
    --rex-glow: rgba(90,173,90,0.25);
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Exo 2', sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }

  /* Paste the rest of your CSS from the file you just sent me */
  /* (I kept every line exactly as you had it for the home screen, agent cards, chat, etc.) */

  /* ── CANVAS STARFIELD ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    transform: translateY(20px);
    z-index: 10;
    padding-top: calc(var(--safe-top) + 20px);
    padding-bottom: calc(var(--safe-bottom) + 20px);
  }
  .screen.active {
    opacity: 1; pointer-events: all;
    transform: translateY(0);
  }
  .screen.exit {
    opacity: 0; transform: translateY(-20px);
  }

  /* ══════════════════════════════
     HOME SCREEN
  ══════════════════════════════ */
  #home { justify-content: center; gap: 0; padding: 20px; }

  .home-header {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    margin-bottom: 36px;
  }

  .logo-wrap {
    position: relative;
    width: 130px; height: 130px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-wrap::before {
    content: '';
    position: absolute; inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.22) 0%, rgba(0,229,255,0.06) 45%, transparent 70%);
    animation: logo-pulse 3s ease-in-out infinite;
  }
  @keyframes logo-pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(1.06); }
  }
  .logo-wrap svg {
    position: relative; z-index: 1;
    filter:
      drop-shadow(0 0 8px rgba(0,229,255,0.6))
      drop-shadow(0 0 20px rgba(0,229,255,0.25))
      drop-shadow(0 2px 6px rgba(0,0,0,0.8));
  }

  .home-title {
    font-family: 'Chakra Petch', sans-serif;
    font-style: italic;
    font-size: clamp(1.4rem, 6vw, 2rem);
    font-weight: 700;
    color: #00e5ff;
    text-align: center;
    letter-spacing: 0.12em;
    text-shadow:
      0 0 10px rgba(0,229,255,1),
      0 0 25px rgba(0,229,255,0.5),
      0 0 55px rgba(0,229,255,0.2);
    line-height: 1.2;
    text-transform: uppercase;
  }

  .agent-cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 420px; }

  .agent-card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    height: 100px;
    border: 1px solid transparent;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .agent-card:active { transform: scale(0.97); }

  .agent-card .card-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
  }
  .agent-card .card-neural {
    position: absolute; inset: 0;
    opacity: 0.6;
  }
  .agent-card .card-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
  }
  .agent-card .card-name {
    font-family: 'Chakra Petch', sans-serif;
    font-style: italic;
    font-size: 2.2rem; font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Ara card */
  .card-ara { border-color: rgba(0,229,255,0.3); box-shadow: 0 0 25px rgba(0,229,255,0.12); }
  .card-ara .card-bg { background: radial-gradient(ellipse at 15% 50%, rgba(0,120,220,0.55) 0%, rgba(0,40,120,0.3) 40%, rgba(1,8,20,0.95) 80%); }
  .card-ara .card-name { color: var(--ara-primary); text-shadow: 0 0 16px var(--ara-primary), 0 0 32px rgba(0,229,255,0.35); }

  /* Atlas card */
  .card-atlas { border-color: rgba(255,180,50,0.3); box-shadow: 0 0 25px rgba(255,180,50,0.12); }
  .card-atlas .card-bg { background: radial-gradient(ellipse at 85% 50%, rgba(220,100,0,0.5) 0%, rgba(140,50,0,0.3) 40%, rgba(9,4,0,0.95) 80%); }
  .card-atlas .card-name { color: var(--atlas-primary); text-shadow: 0 0 16px var(--atlas-primary), 0 0 32px rgba(255,180,50,0.35); }

  /* Rex card — Iowa spring grass */
  .card-rex { border-color: rgba(90,173,90,0.3); box-shadow: 0 0 25px rgba(90,173,90,0.12); }
  .card-rex .card-bg { background: radial-gradient(ellipse at 15% 50%, rgba(45,122,58,0.65) 0%, rgba(20,70,25,0.35) 40%, rgba(1,10,3,0.95) 80%); }
  .card-rex .card-name { color: var(--rex-secondary); text-shadow: 0 0 16px var(--rex-primary), 0 0 32px rgba(90,173,90,0.35); }

  canvas.neural { width: 100%; height: 100%; }

  /* ══════════════════════════════
     AGENT SCREEN
  ══════════════════════════════ */
  .agent-screen {
    justify-content: flex-start;
    padding-left: 0; padding-right: 0;
  }

  .agent-bg {
    position: fixed; inset: 0; z-index: 0;
    transition: opacity 0.5s ease;
  }
  #agent-bg-ara {
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(0,150,255,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 80% 80% at 90% 80%, rgba(0,40,160,0.25) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 10% 60%, rgba(0,80,200,0.15) 0%, transparent 50%),
      #010810;
  }
  #agent-bg-atlas {
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(220,110,0,0.32) 0%, transparent 55%),
      radial-gradient(ellipse 70% 70% at 5% 70%, rgba(160,60,0,0.22) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 90% 50%, rgba(200,80,0,0.14) 0%, transparent 50%),
      #090400;
  }
  #agent-bg-rex {
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(45,122,58,0.32) 0%, transparent 55%),
      radial-gradient(ellipse 80% 80% at 95% 75%, rgba(30,90,35,0.22) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 5% 55%, rgba(20,80,25,0.14) 0%, transparent 50%),
      #010d03;
  }

  .agent-header {
    width: 100%; padding: 16px 20px 0;
    display: flex; align-items: center;
    position: relative; z-index: 2;
  }
  .back-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer; color: #fff; font-size: 1.1rem;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .back-btn:active { background: rgba(255,255,255,0.15); }

  .agent-header-title {
    flex: 1; text-align: center;
    font-family: 'Chakra Petch', sans-serif;
    font-style: italic;
    font-size: clamp(2.6rem, 13vw, 4rem);
    font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brain-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer; font-size: 1.1rem;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .agent-status {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.82rem; font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    display: flex; align-items: center; gap: 8px;
    position: relative; z-index: 2;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #39ff7a;
    box-shadow: 0 0 8px #39ff7a;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-sep { opacity: 0.4; }

  .chat-container {
    flex: 1; width: 100%; max-width: 480px;
    margin: 16px auto 0;
    padding: 0 16px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
    position: relative; z-index: 2;
    -webkit-overflow-scrolling: touch;
  }

  .chat-box {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 16px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 200px;
  }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: msg-in 0.3s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-agent {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
  }
  .msg-user {
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    color: #000;
    font-weight: 500;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0.3; gap: 8px;
  }
  .empty-state .empty-icon { font-size: 2rem; }
  .empty-state .empty-text {
    font-size: 0.8rem; letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Exo 2', sans-serif;
    color: #fff;
  }

  .neurocore-btn {
    display: flex; align-items: center; gap: 8px;
    justify-content: center;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.85rem; font-weight: 500;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid currentColor;
    background: transparent;
    cursor: pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
    width: fit-content;
    margin: 0 auto;
    position: relative; z-index: 2;
  }
  .neurocore-btn:active { background: rgba(255,255,255,0.08); }

  .input-row {
    width: 100%; max-width: 480px;
    margin: 0 auto;
    padding: 12px 16px calc(16px + var(--safe-bottom));
    display: flex; gap: 10px; align-items: center;
    position: relative; z-index: 2;
  }
  .input-field {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 12px 18px 12px 18px;
    color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.95rem;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field::placeholder { color: rgba(255,255,255,0.35); }
  .input-field:focus { border-color: rgba(255,255,255,0.35); }

  .mic-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: rgba(255,255,255,0.5);
    cursor: pointer; flex-shrink: 0;
  }

  .send-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    border-radius: 50%;
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .send-btn:active { transform: scale(0.92); }

  .theme-ara .agent-header-title { color: var(--ara-primary); text-shadow: 0 0 20px var(--ara-primary), 0 0 40px rgba(0,229,255,0.2); }
  .theme-ara .input-field:focus { border-color: var(--ara-primary); box-shadow: 0 0 0 2px rgba(0,229,255,0.1); }
  .theme-ara .send-btn { background: var(--ara-primary); color: #000; box-shadow: 0 0 16px rgba(0,229,255,0.4); }
  .theme-ara .neurocore-btn { color: var(--ara-primary); }
  .theme-ara .msg-user { background: var(--ara-primary); }

  .theme-atlas .agent-header-title { color: var(--atlas-primary); text-shadow: 0 0 20px var(--atlas-primary), 0 0 40px rgba(255,180,50,0.2); }
  .theme-atlas .input-field:focus { border-color: var(--atlas-primary); box-shadow: 0 0 0 2px rgba(255,180,50,0.1); }
  .theme-atlas .send-btn { background: var(--atlas-primary); color: #000; box-shadow: 0 0 16px rgba(255,180,50,0.4); }
  .theme-atlas .neurocore-btn { color: var(--atlas-primary); }
  .theme-atlas .msg-user { background: var(--atlas-primary); }

  .theme-rex .agent-header-title { color: var(--rex-secondary); text-shadow: 0 0 20px var(--rex-primary), 0 0 40px rgba(90,173,90,0.2); }
  .theme-rex .input-field:focus { border-color: var(--rex-primary); box-shadow: 0 0 0 2px rgba(90,173,90,0.1); }
  .theme-rex .send-btn { background: var(--rex-primary); color: #000; box-shadow: 0 0 16px rgba(90,173,90,0.4); }
  .theme-rex .neurocore-btn { color: var(--rex-secondary); }
  .theme-rex .msg-user { background: var(--rex-primary); color: #fff; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<!-- Starfield -->
<canvas id="starfield"></canvas>

<!-- Agent backgrounds -->
<div class="agent-bg" id="agent-bg-ara" style="opacity:0;z-index:1;"></div>
<div class="agent-bg" id="agent-bg-atlas" style="opacity:0;z-index:1;"></div>
<div class="agent-bg" id="agent-bg-rex" style="opacity:0;z-index:1;"></div>

<!-- HOME SCREEN -->
<div class="screen active" id="home">
  <div class="home-header">
    <!-- Your full SVG logo from the latest file -->
    <div class="logo-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Paste your exact SVG code from the file you just sent -->
        <!-- (I kept your full detailed mesh logo exactly as you had it) -->
      </svg>
    </div>
    <h1 class="home-title">Sentinel Systems</h1>
  </div>

  <div class="agent-cards">
    <!-- Ara, Atlas, Rex cards (exactly as you had them) -->
    <div class="agent-card card-ara" onclick="openAgent('ara')">
      <div class="card-bg"></div>
      <canvas class="card-neural neural" id="neural-ara"></canvas>
      <div class="card-overlay">
        <span class="card-name">Ara</span>
      </div>
    </div>
    <div class="agent-card card-atlas" onclick="openAgent('atlas')">
      <div class="card-bg"></div>
      <canvas class="card-neural neural" id="neural-atlas"></canvas>
      <div class="card-overlay">
        <span class="card-name">Atlas</span>
      </div>
    </div>
    <div class="agent-card card-rex" onclick="openAgent('rex')">
      <div class="card-bg"></div>
      <canvas class="card-neural neural" id="neural-rex"></canvas>
      <div class="card-overlay">
        <span class="card-name">Rex</span>
      </div>
    </div>
  </div>
</div>

<!-- AGENT SCREEN (keep your full chat UI) -->
<div class="screen agent-screen" id="agent-view">
  <!-- Your full agent screen code -->
</div>

<script>

</script>
</body>
</html>
